version: '3.8'

services:
  # NexusAI API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nexusai-server
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - postgres
    volumes:
      - ./server:/app
    restart: unless-stopped
    networks:
      - nexusai-network

  # NexusAI Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: nexusai-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:8000
    depends_on:
      - server
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - nexusai-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexusai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - nexusai-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexusai-postgres
    environment:
      - POSTGRES_USER=nexusai
      - POSTGRES_PASSWORD=${DB_PASSWORD:-nexusai123}
      - POSTGRES_DB=nexusai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nexusai-network

  # Ollama (Local AI)
  ollama:
    image: ollama/ollama:latest
    container_name: nexusai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - nexusai-network

networks:
  nexusai-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  ollama-data:
